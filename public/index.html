<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kart Tarayıcı</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; padding: 24px 16px 48px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 480px; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 13px; color: #666; margin-bottom: 28px; }
.screen { display: none; }
.screen.active { display: block; }
.progress { display: flex; gap: 4px; margin-bottom: 28px; }
.pr { flex: 1; height: 3px; border-radius: 2px; background: #222; transition: background 0.3s; }
.pr.done { background: #e8ff47; }
.pr.active { background: #555; }

.upload-btn { width: 100%; min-height: 200px; border: 2px dashed #2a2a2a; border-radius: 14px; background: #1a1a1a; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; transition: border-color 0.2s; }
.upload-btn:hover { border-color: #e8ff47; }
.upload-btn svg { width: 40px; height: 40px; stroke: #555; }
.upload-btn span { font-size: 15px; color: #888; }
.upload-btn small { font-size: 12px; color: #444; }
#fileInput { display: none; }

#scanImg, #reviewImg { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 16px; }
.spinner-box { background: #1a1a1a; border-radius: 12px; padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 2px solid #2a2a2a; border-top-color: #e8ff47; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#scanMsg { font-size: 14px; color: #666; }

.lbl { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.section-sep { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin: 16px 0 10px; border-top: 1px solid #1e1e1e; padding-top: 14px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.full { grid-column: 1 / -1; }
.rf label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.rf input, .rf select, .rf textarea { width: 100%; padding: 10px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #f0f0f0; font-size: 14px; font-family: inherit; }
.rf input:focus, .rf select:focus, .rf textarea:focus { outline: none; border-color: #3a3a3a; }
.rf select option { background: #1a1a1a; }
.rf textarea { resize: vertical; }

.btn-row { display: flex; gap: 8px; margin-top: 20px; }
button.primary { background: #e8ff47; color: #0f0f0f; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; flex: 1; }
button.primary:hover { background: #d4eb30; }
button.secondary { background: transparent; color: #888; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; font-size: 14px; cursor: pointer; font-family: inherit; flex: 1; }
button.secondary:hover { color: #f0f0f0; }
button.danger { background: transparent; color: #f87171; border: 1px solid #2a1a1a; border-radius: 8px; padding: 12px; font-size: 14px; cursor: pointer; font-family: inherit; flex: 1; }

.error { background: #1a0f0f; border: 1px solid #3a1a1a; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #f87171; margin-top: 12px; }
.success-box { background: #0f1a0f; border: 1px solid #1a3a1a; border-radius: 14px; padding: 32px; text-align: center; }
.check { font-size: 48px; margin-bottom: 12px; }
.success-box h2 { font-size: 18px; font-weight: 600; color: #4ade80; margin-bottom: 6px; }
.success-box p { font-size: 14px; color: #666; margin-bottom: 16px; }
.deal-link { display: inline-block; padding: 10px 20px; background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px; color: #4ade80; font-size: 13px; text-decoration: none; }
.admin-link { display: block; text-align: center; margin-top: 24px; font-size: 12px; color: #333; text-decoration: none; }
.admin-link:hover { color: #555; }
canvas { display: none; }
</style>
</head>
<body>
<div class="app">
  <h1>🪪 Kart Tarayıcı</h1>
  <p class="sub">Vizit kartı → Bitrix24 Deal</p>

  <div class="progress">
    <div class="pr active" id="pr1"></div>
    <div class="pr" id="pr2"></div>
    <div class="pr" id="pr3"></div>
  </div>

  <!-- Adım 1: Kamera -->
  <div class="screen active" id="step1">
    <div class="upload-btn" onclick="document.getElementById('fileInput').click()">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
      </svg>
      <span>Kart fotoğrafı çek veya seç</span>
      <small>JPG, PNG, HEIC desteklenir</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <a href="/admin.html" class="admin-link">⚙ Admin Paneli</a>
  </div>

  <!-- Adım 2: Taranıyor -->
  <div class="screen" id="step2">
    <img id="scanImg" alt="Kart">
    <div class="spinner-box">
      <div class="spinner"></div>
      <p id="scanMsg">Kart okunuyor...</p>
    </div>
  </div>

  <!-- Adım 3: Düzenle -->
  <div class="screen" id="step3">
    <img id="reviewImg" alt="Kart">
    <p class="lbl">Kart bilgileri</p>
    <div class="grid">
      <div class="rf full"><label>Ad Soyad</label><input type="text" id="f-name"></div>
      <div class="rf"><label>Ünvan</label><input type="text" id="f-title"></div>
      <div class="rf"><label>Firma</label><input type="text" id="f-company"></div>
      <div class="rf"><label>Telefon</label><input type="tel" id="f-phone"></div>
      <div class="rf"><label>E-posta</label><input type="email" id="f-email"></div>
      <div class="rf"><label>Website</label><input type="text" id="f-web"></div>
      <div class="rf full"><label>Adres</label><input type="text" id="f-address"></div>
      <div class="rf full">
        <label>Not / Yorum <span style="color:#444;font-weight:400">(timeline'a eklenir)</span></label>
        <textarea id="f-note" rows="3" placeholder="Bu kişi hakkında not ekle..."></textarea>
      </div>
    </div>

    <p class="section-sep">Bitrix24 Ayarları</p>
    <div class="grid">
      <div class="rf full"><label>Deal Başlığı</label><input type="text" id="f-deal"></div>
      <div class="rf full">
        <label>Sorumlu Kişi <a href="#" onclick="clearUser()" style="color:#444;font-size:11px;float:right;">Değiştir</a></label>
        <select id="f-assigned">
          <option value="">Yükleniyor...</option>
        </select>
      </div>
      <div class="rf">
        <label>Müşteri Türü</label>
        <select id="f-ctype">
          <option value="">Seçilmedi</option>
          <option value="4034|4136">Müşteri / Son Kullanıcı</option>
          <option value="4036|4138">Bayi / Servis Yetkilisi</option>
          <option value="4038|4140">Rakip Firma Yetkilisi</option>
          <option value="4040|4142">İnşaat Firma Yetkilisi</option>
          <option value="4042|4144">Proje Firması Yetkilisi</option>
          <option value="4044|4146">Mimarlık Firması Yetkilisi</option>
          <option value="4046|4148">Elektrik Firma Yetkilisi</option>
          <option value="4048|4150">Zayıf Akım Firma Yetkilisi</option>
          <option value="4082|4152">Akuvox Sales Partner</option>
        </select>
      </div>
      <div class="rf">
        <label>Kaynak</label>
        <select id="f-source">
          <option value="">Seçilmedi</option>
          <option value="PARTNER">Mevcut Müşteri (Bayi)</option>
          <option value="FACE_TRACKER">Tarama Ziyareti</option>
          <option value="RECOMMENDATION">Tanıdık Yönlendirmesi</option>
          <option value="RC_GENERATOR">Öz Satış (Satış Yöneticisi Portföyü)</option>
          <option value="EMAIL">E-Mail</option>
          <option value="CALL">Arama</option>
          <option value="ADVERTISING">Reklam</option>
          <option value="STORE">Çevrimiçi Mağaza</option>
          <option value="BOOKING">Rezervasyon</option>
          <option value="WEBFORM">CRM Form</option>
          <option value="CALLBACK">Geri arama</option>
          <option value="UC_Q1XV0L">Fuar, Seminer, Etkinlik</option>
        </select>
      </div>
    </div>

    <div id="errBox"></div>
    <div class="btn-row">
      <button class="danger" onclick="resetScan()">↺ Yeniden</button>
      <button class="primary" onclick="sendDeal()">Bitrix24'e Gönder →</button>
    </div>
  </div>

  <!-- Adım 4: Başarılı -->
  <div class="screen" id="step4">
    <div class="success-box">
      <div class="check">✅</div>
      <h2>Deal oluşturuldu!</h2>
      <p id="successName"></p>
      <a id="dealLink" class="deal-link" href="#" target="_blank">Bitrix24'te görüntüle →</a>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="secondary" onclick="resetScan()">+ Yeni kart tara</button>
    </div>
  </div>
</div>

<canvas id="cvs"></canvas>

<script>
function setStep(n) {
  ['step1','step2','step3','step4'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  [1,2,3].forEach(i => {
    const el = document.getElementById('pr'+i);
    el.className = 'pr' + (i < n ? ' done' : i === n ? ' active' : '');
  });
}

// Kullanıcıları yükle - seçili kullanıcıyı hatırla
async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    const data = await res.json();
    const sel = document.getElementById('f-assigned');
    sel.innerHTML = '<option value="">Seçilmedi</option>';
    (data.users || []).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });
    // localStorage'dan hatırla
    const saved = localStorage.getItem('assigned_user_id');
    if (saved) sel.value = saved;
  } catch(e) {
    document.getElementById('f-assigned').innerHTML = '<option value="">Seçilmedi</option>';
  }
}
loadUsers();

// Sorumlu kişi değişince kaydet
document.getElementById('f-assigned').addEventListener('change', function() {
  if (this.value) localStorage.setItem('assigned_user_id', this.value);
});

function toJpegBlob(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const cvs = document.getElementById('cvs');
      const MAX = 1600;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      cvs.width = w; cvs.height = h;
      cvs.getContext('2d').drawImage(img, 0, 0, w, h);
      cvs.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', 0.88);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Görsel yüklenemedi')); };
    img.src = url;
  });
}

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const previewUrl = URL.createObjectURL(file);
  document.getElementById('scanImg').src = previewUrl;
  document.getElementById('reviewImg').src = previewUrl;
  setStep(2);
  try {
    const jpegBlob = await toJpegBlob(file);
    document.getElementById('scanMsg').textContent = 'Kart okunuyor...';
    const formData = new FormData();
    formData.append('image', jpegBlob, 'card.jpg');
    const res = await fetch('/api/scan', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('f-name').value = data.name || '';
    document.getElementById('f-title').value = data.title || '';
    document.getElementById('f-company').value = data.company || '';
    document.getElementById('f-phone').value = data.phone || '';
    document.getElementById('f-email').value = data.email || '';
    document.getElementById('f-web').value = data.website || '';
    document.getElementById('f-address').value = data.address || '';
    document.getElementById('f-deal').value = [data.name, data.company].filter(Boolean).join(' - ') || 'Yeni Deal';
    document.getElementById('f-note').value = '';
    setStep(3);
  } catch(err) {
    alert('Hata: ' + err.message);
    setStep(1);
  }
});

async function sendDeal() {
  document.getElementById('errBox').innerHTML = '';
  const body = {
    name: document.getElementById('f-name').value,
    title: document.getElementById('f-title').value,
    company: document.getElementById('f-company').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    website: document.getElementById('f-web').value,
    address: document.getElementById('f-address').value,
    dealTitle: document.getElementById('f-deal').value,
    customerType: document.getElementById('f-ctype').value,
    source: document.getElementById('f-source').value,
    assignedBy: document.getElementById('f-assigned').value,
    note: document.getElementById('f-note').value
  };
  try {
    const res = await fetch('/api/deal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('successName').textContent = body.dealTitle;
      document.getElementById('dealLink').href = data.url;
      setStep(4);
    } else {
      document.getElementById('errBox').innerHTML = `<div class="error">${data.error}</div>`;
    }
  } catch(err) {
    document.getElementById('errBox').innerHTML = `<div class="error">${err.message}</div>`;
  }
}

function clearUser() {
  localStorage.removeItem('assigned_user_id');
  document.getElementById('f-assigned').value = '';
  return false;
}

function resetScan() {
  document.getElementById('fileInput').value = '';
  document.getElementById('errBox').innerHTML = '';
  setStep(1);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f; color: #f0f0f0;
  min-height: 100vh; padding: 24px 16px 48px;
  display: flex; justify-content: center;
}
.app { width: 100%; max-width: 480px; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 13px; color: #555; margin-bottom: 28px; }

.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
.card h2 { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
.fg { margin-bottom: 12px; }
.fg:last-of-type { margin-bottom: 0; }
.fg label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
.fg input {
  width: 100%; padding: 10px 12px;
  background: #111; border: 1px solid #2a2a2a;
  border-radius: 8px; color: #f0f0f0; font-size: 14px;
  font-family: monospace; transition: border-color 0.15s;
}
.fg input:focus { outline: none; border-color: #3a3a3a; }
.fg input::placeholder { color: #333; }

.row { display: flex; gap: 8px; margin-top: 14px; }
button {
  flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500;
  cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: #888;
  transition: all 0.15s; font-family: inherit;
}
button:hover { color: #f0f0f0; border-color: #3a3a3a; }
button.primary { background: #e8ff47; color: #0f0f0f; border-color: #e8ff47; }
button.primary:hover { background: #d4eb30; }
button.danger { color: #f87171; border-color: #2a1a1a; }
button.danger:hover { background: #1a0f0f; }

.msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 10px; }
.msg.ok { background: #0f1a0f; border: 1px solid #1a3a1a; color: #4ade80; }
.msg.err { background: #1a0f0f; border: 1px solid #3a1a1a; color: #f87171; }

.current { font-size: 12px; color: #555; margin-top: 6px; font-family: monospace; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.badge.set { background: #0f1a0f; color: #4ade80; border: 1px solid #1a3a1a; }
.badge.empty { background: #1a1a0f; color: #888; border: 1px solid #2a2a1a; }

#loginScreen { }
#adminScreen { display: none; }
</style>
</head>
<body>
<div class="app">
  <h1>⚙ Admin Panel</h1>
  <p class="sub">Kart Tarayıcı → Ayarlar</p>

  <!-- Login -->
  <div id="loginScreen">
    <div class="card">
      <h2>Giriş</h2>
      <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="lUser" placeholder="admin"></div>
      <div class="fg"><label>Şifre</label><input type="password" id="lPass" placeholder="••••••"></div>
      <div id="loginMsg"></div>
      <div class="row">
        <button class="primary" onclick="login()">Giriş Yap</button>
      </div>
    </div>
    <p style="font-size:12px;color:#333;text-align:center;margin-top:12px;">
      Varsayılan: admin / admin123 (Railway'den değiştirin)
    </p>
  </div>

  <!-- Admin Panel -->
  <div id="adminScreen">
    <!-- OpenAI -->
    <div class="card">
      <h2>🤖 OpenAI API Key</h2>
      <div class="fg">
        <label>API Key</label>
        <input type="password" id="openaiKey" placeholder="sk-...">
      </div>
      <p class="current" id="openaiStatus"></p>
      <div class="row">
        <button class="danger" onclick="deleteKey('openai_key')">Sil</button>
        <button class="primary" onclick="saveKey('openai')">Kaydet</button>
      </div>
      <div id="openaiMsg"></div>
    </div>

    <!-- Bitrix24 -->
    <div class="card">
      <h2>🔗 Bitrix24 Webhook</h2>
      <div class="fg">
        <label>Webhook URL</label>
        <input type="text" id="bitrixUrl" placeholder="https://sirket.bitrix24.com.tr/rest/1/xxx/">
      </div>
      <p class="current" id="bitrixStatus"></p>
      <div class="row">
        <button class="danger" onclick="deleteKey('bitrix_url')">Sil</button>
        <button class="primary" onclick="saveKey('bitrix')">Kaydet</button>
      </div>
      <div id="bitrixMsg"></div>
    </div>

    <!-- Şifre -->
    <div class="card">
      <h2>🔒 Admin Şifresi</h2>
      <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="newUser" placeholder="admin"></div>
      <div class="fg"><label>Yeni Şifre</label><input type="password" id="newPass" placeholder="••••••"></div>
      <div class="row">
        <button class="primary" onclick="savePass()">Güncelle</button>
      </div>
      <div id="passMsg"></div>
    </div>

    <div class="row">
      <button onclick="logout()">Çıkış Yap</button>
      <a href="/" style="flex:1;text-decoration:none;"><button>← Ana Sayfa</button></a>
    </div>
  </div>
</div>

<script>
let token = sessionStorage.getItem('adminToken') || '';

async function login() {
  const user = document.getElementById('lUser').value.trim();
  const pass = document.getElementById('lPass').value;
  const r = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user, pass })
  });
  const d = await r.json();
  if (d.success) {
    token = d.token;
    sessionStorage.setItem('adminToken', token);
    showAdmin();
  } else {
    document.getElementById('loginMsg').innerHTML = `<div class="msg err">${d.error}</div>`;
  }
}

async function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  const r = await fetch('/admin/config', { headers: { 'Authorization': 'Basic ' + token } });
  const d = await r.json();
  document.getElementById('openaiStatus').innerHTML = d.openai_key
    ? `Mevcut: <span class="badge set">${d.openai_key}</span>`
    : `<span class="badge empty">Tanımlı değil</span>`;
  document.getElementById('bitrixStatus').innerHTML = d.bitrix_url
    ? `Mevcut: <span class="badge set">${d.bitrix_url}</span>`
    : `<span class="badge empty">Tanımlı değil</span>`;
  document.getElementById('newUser').value = d.admin_user || '';
}

async function saveKey(type) {
  const body = {};
  if (type === 'openai') body.openai_key = document.getElementById('openaiKey').value.trim();
  if (type === 'bitrix') body.bitrix_url = document.getElementById('bitrixUrl').value.trim();

  const r = await fetch('/admin/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + token },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  const el = document.getElementById(type === 'openai' ? 'openaiMsg' : 'bitrixMsg');
  el.innerHTML = d.success ? `<div class="msg ok">✓ Kaydedildi</div>` : `<div class="msg err">${d.error}</div>`;
  if (d.success) { showAdmin(); setTimeout(() => el.innerHTML = '', 3000); }
}

async function deleteKey(key) {
  if (!confirm('Silmek istediğinizden emin misiniz?')) return;
  const r = await fetch(`/admin/config/${key}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Basic ' + token }
  });
  const d = await r.json();
  if (d.success) showAdmin();
}

async function savePass() {
  const body = {
    admin_user: document.getElementById('newUser').value.trim(),
    new_pass: document.getElementById('newPass').value
  };
  const r = await fetch('/admin/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + token },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  const el = document.getElementById('passMsg');
  el.innerHTML = d.success ? `<div class="msg ok">✓ Güncellendi. Tekrar giriş yapın.</div>` : `<div class="msg err">${d.error}</div>`;
  if (d.success) { sessionStorage.removeItem('adminToken'); setTimeout(() => { token = ''; location.reload(); }, 2000); }
}

function logout() {
  sessionStorage.removeItem('adminToken');
  token = '';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminScreen').style.display = 'none';
}

// Oturum varsa direkt göster
if (token) showAdmin();

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>

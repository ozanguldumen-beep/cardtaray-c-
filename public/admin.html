<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; padding: 24px 16px 48px; display: flex; justify-content: center; }
.app { width: 100%; max-width: 520px; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 13px; color: #555; margin-bottom: 28px; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
.card h2 { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
.fg { margin-bottom: 10px; }
.fg label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.fg input, .fg select { width: 100%; padding: 9px 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; color: #f0f0f0; font-size: 14px; font-family: inherit; }
.fg input:focus, .fg select:focus { outline: none; border-color: #3a3a3a; }
.fg input::placeholder { color: #333; }
.fg select option { background: #1a1a1a; }
.row { display: flex; gap: 8px; margin-top: 12px; }
.btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: #888; font-family: inherit; transition: all 0.15s; }
.btn:hover { color: #f0f0f0; border-color: #3a3a3a; }
.btn.primary { background: #e8ff47; color: #0f0f0f; border-color: #e8ff47; }
.btn.primary:hover { background: #d4eb30; }
.btn.danger { color: #f87171; border-color: #2a1a1a; }
.btn.danger:hover { background: #1a0f0f; }
.btn.sm { flex: none; padding: 6px 12px; font-size: 12px; }
.msg { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-top: 8px; }
.msg.ok { background: #0f1a0f; border: 1px solid #1a3a1a; color: #4ade80; }
.msg.err { background: #1a0f0f; border: 1px solid #3a1a1a; color: #f87171; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.badge.set { background: #0f1a0f; color: #4ade80; border: 1px solid #1a3a1a; }
.badge.empty { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
.user-list { margin-top: 12px; }
.user-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 8px; }
.user-item .info { flex: 1; }
.user-item .info .name { font-size: 14px; color: #f0f0f0; }
.user-item .info .detail { font-size: 12px; color: #555; margin-top: 2px; }
.user-item .actions { display: flex; gap: 6px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
#loginScreen { }
#adminScreen { display: none; }
</style>
</head>
<body>
<div class="app">
  <h1>⚙ Admin Panel</h1>
  <p class="sub">Kart Tarayıcı Yönetimi</p>

  <div id="loginScreen">
    <div class="card">
      <h2>Giriş</h2>
      <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="lUser" placeholder="admin"></div>
      <div class="fg"><label>Şifre</label><input type="password" id="lPass" placeholder="••••••"></div>
      <div id="loginMsg"></div>
      <div class="row"><button class="btn primary" onclick="login()">Giriş Yap</button></div>
    </div>
  </div>

  <div id="adminScreen">

    <!-- Google Vision -->
    <div class="card">
      <h2>🔍 Google Vision API Key</h2>
      <div class="fg"><label>API Key</label><input type="password" id="googleKey" placeholder="AIzaSy..."></div>
      <p style="font-size:12px;color:#444;margin-top:6px;" id="googleStatus"></p>
      <div class="row">
        <button class="btn danger" onclick="deleteKey('google_vision_key')">Sil</button>
        <button class="btn primary" onclick="saveKey('google')">Kaydet</button>
      </div>
      <div id="googleMsg"></div>
    </div>

    <!-- Bitrix24 Webhook -->
    <div class="card">
      <h2>🔗 Bitrix24 Webhook</h2>
      <div class="fg"><label>Webhook URL</label><input type="text" id="bitrixUrl" placeholder="https://...bitrix24.com.tr/rest/..."></div>
      <p style="font-size:12px;color:#444;margin-top:6px;" id="bitrixStatus"></p>
      <div class="row">
        <button class="btn danger" onclick="deleteKey('bitrix_url')">Sil</button>
        <button class="btn primary" onclick="saveKey('bitrix')">Kaydet</button>
      </div>
      <div id="bitrixMsg"></div>
    </div>

    <!-- Kullanıcı Yönetimi -->
    <div class="card">
      <h2>👥 Kullanıcı Yönetimi</h2>

      <div id="userList" class="user-list"></div>

      <div style="border-top:1px solid #222;margin-top:14px;padding-top:14px;">
        <p style="font-size:12px;color:#666;margin-bottom:12px;">Yeni Kullanıcı Ekle / Düzenle</p>
        <input type="hidden" id="editUserId">
        <div class="fg"><label>Ad Soyad</label><input type="text" id="uName" placeholder="Ahmet Yılmaz"></div>
        <div class="grid2">
          <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="uUsername" placeholder="ahmet" autocomplete="off"></div>
          <div class="fg"><label>Şifre</label><input type="password" id="uPassword" placeholder="••••••" autocomplete="new-password"></div>
        </div>
        <div class="fg">
          <label>Bitrix24 Hesabı</label>
          <select id="uBitrixId">
            <option value="">Yükleniyor...</option>
          </select>
        </div>
        <div id="userMsg"></div>
        <div class="row">
          <button class="btn danger" onclick="clearUserForm()">Temizle</button>
          <button class="btn primary" onclick="saveUser()">Kaydet</button>
        </div>
      </div>
    </div>

    <!-- Admin Şifresi -->
    <div class="card">
      <h2>🔒 Admin Şifresi</h2>
      <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="newAdminUser" placeholder="admin"></div>
      <div class="fg"><label>Yeni Şifre</label><input type="password" id="newAdminPass" placeholder="••••••"></div>
      <div class="row"><button class="btn primary" onclick="saveAdminPass()">Güncelle</button></div>
      <div id="passMsg"></div>
    </div>

    <div class="row">
      <button class="btn" onclick="logout()">Çıkış</button>
      <a href="/" style="flex:1;text-decoration:none;"><button class="btn">← Ana Sayfa</button></a>
    </div>
  </div>
</div>

<script>
let token = sessionStorage.getItem('adminToken') || '';
let bitrixUsers = [];

async function login() {
  const user = document.getElementById('lUser').value.trim();
  const pass = document.getElementById('lPass').value;
  const r = await fetch('/admin/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({user, pass}) });
  const d = await r.json();
  if (d.success) { token = d.token; sessionStorage.setItem('adminToken', token); showAdmin(); }
  else document.getElementById('loginMsg').innerHTML = `<div class="msg err">${d.error}</div>`;
}

async function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';

  const r = await fetch('/admin/config', { headers: {'Authorization': 'Basic ' + token} });
  const d = await r.json();

  document.getElementById('googleStatus').innerHTML = d.google_vision_key
    ? `Mevcut: <span class="badge set">${d.google_vision_key}</span>`
    : `<span class="badge empty">Tanımlı değil</span>`;
  document.getElementById('bitrixStatus').innerHTML = d.bitrix_url
    ? `<span class="badge set">Tanımlı ✓</span>`
    : `<span class="badge empty">Tanımlı değil</span>`;
  document.getElementById('newAdminUser').value = d.admin_user || '';

  renderUsers(d.sales_users || []);
  loadBitrixUsers();
}

function renderUsers(users) {
  const el = document.getElementById('userList');
  if (!users.length) { el.innerHTML = '<p style="font-size:13px;color:#444;">Henüz kullanıcı yok</p>'; return; }
  el.innerHTML = users.map(u => `
    <div class="user-item">
      <div class="info">
        <div class="name">${u.name}</div>
        <div class="detail">Bitrix ID: ${u.bitrix_id || 'Atanmamış'}</div>
      </div>
      <div class="actions">
        <button class="btn sm" onclick="editUser('${u.id}', '${u.name}', '${u.bitrix_id||''}')">Düzenle</button>
        <button class="btn sm danger" onclick="deleteUser('${u.id}')">Sil</button>
      </div>
    </div>
  `).join('');
}

async function loadBitrixUsers() {
  try {
    const r = await fetch('/admin/bitrix-users', { headers: {'Authorization': 'Basic ' + token} });
    const d = await r.json();
    bitrixUsers = d.users || [];
    const sel = document.getElementById('uBitrixId');
    sel.innerHTML = '<option value="">Seçilmedi</option>';
    bitrixUsers.forEach(u => {
      sel.innerHTML += `<option value="${u.id}">${u.name}</option>`;
    });
  } catch(e) {
    document.getElementById('uBitrixId').innerHTML = '<option value="">Yüklenemedi</option>';
  }
}

async function saveKey(type) {
  const body = {};
  if (type === 'google') body.google_vision_key = document.getElementById('googleKey').value.trim();
  if (type === 'bitrix') body.bitrix_url = document.getElementById('bitrixUrl').value.trim();
  const r = await fetch('/admin/config', { method: 'POST', headers: {'Content-Type':'application/json','Authorization':'Basic '+token}, body: JSON.stringify(body) });
  const d = await r.json();
  const el = document.getElementById(type === 'google' ? 'googleMsg' : 'bitrixMsg');
  el.innerHTML = d.success ? `<div class="msg ok">✓ Kaydedildi</div>` : `<div class="msg err">${d.error}</div>`;
  if (d.success) { showAdmin(); setTimeout(() => el.innerHTML = '', 3000); }
}

async function deleteKey(key) {
  if (!confirm('Silmek istediğinizden emin misiniz?')) return;
  await fetch(`/admin/config/${key}`, { method: 'DELETE', headers: {'Authorization':'Basic '+token} });
  showAdmin();
}

async function saveUser() {
  const id = document.getElementById('editUserId').value;
  const name = document.getElementById('uName').value.trim();
  const username = document.getElementById('uUsername').value.trim();
  const password = document.getElementById('uPassword').value;
  const bitrix_id = document.getElementById('uBitrixId').value;
  const el = document.getElementById('userMsg');

  if (!name || !username) { el.innerHTML = '<div class="msg err">Ad ve kullanıcı adı zorunlu</div>'; return; }
  if (!id && !password) { el.innerHTML = '<div class="msg err">Yeni kullanıcı için şifre zorunlu</div>'; return; }

  const body = { name, username, bitrix_id };
  if (id) body.id = id;
  if (password) body.password = password;

  const r = await fetch('/admin/sales-user', { method: 'POST', headers: {'Content-Type':'application/json','Authorization':'Basic '+token}, body: JSON.stringify(body) });
  const d = await r.json();
  el.innerHTML = d.success ? `<div class="msg ok">✓ Kaydedildi</div>` : `<div class="msg err">${d.error}</div>`;
  if (d.success) { clearUserForm(); showAdmin(); setTimeout(() => el.innerHTML = '', 3000); }
}

function editUser(id, name, bitrix_id) {
  document.getElementById('editUserId').value = id;
  document.getElementById('uName').value = name;
  document.getElementById('uBitrixId').value = bitrix_id;
  document.getElementById('uPassword').value = '';
  document.getElementById('uUsername').value = '';
  document.getElementById('uPassword').placeholder = 'Boş bırakırsan değişmez';
  window.scrollTo(0, document.body.scrollHeight);
}

function clearUserForm() {
  document.getElementById('editUserId').value = '';
  document.getElementById('uName').value = '';
  document.getElementById('uUsername').value = '';
  document.getElementById('uPassword').value = '';
  document.getElementById('uPassword').placeholder = '••••••';
  document.getElementById('uBitrixId').value = '';
}

async function deleteUser(id) {
  if (!confirm('Bu kullanıcıyı silmek istediğinizden emin misiniz?')) return;
  await fetch(`/admin/sales-user/${id}`, { method: 'DELETE', headers: {'Authorization':'Basic '+token} });
  showAdmin();
}

async function saveAdminPass() {
  const admin_user = document.getElementById('newAdminUser').value.trim();
  const new_pass = document.getElementById('newAdminPass').value;
  const r = await fetch('/admin/config', { method: 'POST', headers: {'Content-Type':'application/json','Authorization':'Basic '+token}, body: JSON.stringify({admin_user, new_pass}) });
  const d = await r.json();
  const el = document.getElementById('passMsg');
  el.innerHTML = d.success ? `<div class="msg ok">✓ Güncellendi. Tekrar giriş yapın.</div>` : `<div class="msg err">${d.error}</div>`;
  if (d.success) { sessionStorage.removeItem('adminToken'); setTimeout(() => location.reload(), 2000); }
}

function logout() { sessionStorage.removeItem('adminToken'); token = ''; document.getElementById('loginScreen').style.display='block'; document.getElementById('adminScreen').style.display='none'; }

document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') login(); });
if (token) showAdmin();
</script>
</body>
</html>
